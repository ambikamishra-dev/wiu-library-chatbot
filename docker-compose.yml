version: "3.9"

services:
  chatbot:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount data and logs folders from host into container
      # This ensures FAQ Excel file and SQLite DB persist across restarts
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3